name: Scheduled Ingestion

on:
  schedule:
    # Run every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingestion
        run: |
          curl -sf -X POST \
            -H "x-api-key: ${{ secrets.INGEST_API_KEY }}" \
            "${{ secrets.SITE_URL }}/api/ingest"
